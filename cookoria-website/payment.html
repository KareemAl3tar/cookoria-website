<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>باقات الاشتراك - Cookoria</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pricing-container { max-width: 1200px; margin: 50px auto; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
    .pricing-card { background: white; border-radius: 30px; padding: 30px; width: 300px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer; border: 2px solid transparent; }
    .pricing-card:hover { transform: translateY(-10px); border-color: #d97706; }
    .pricing-card.premium { background: linear-gradient(135deg, #fff8e7, #ffe0b5); border-color: #d97706; }
    .price { font-size: 48px; font-weight: bold; color: #d97706; margin: 20px 0; }
    .price small { font-size: 16px; }
    .subscribe-btn { background: #d97706; color: white; border: none; padding: 12px 30px; border-radius: 40px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 20px; }
    .badge { background: #d97706; color: white; padding: 5px 12px; border-radius: 30px; font-size: 12px; display: inline-block; margin-bottom: 15px; }
    .demo-badge { background: #38a169; color: white; padding: 8px 16px; border-radius: 30px; font-size: 14px; text-align: center; max-width: 400px; margin: 20px auto; }
    .success-message { background: #c6f6d5; color: #22543d; padding: 15px; border-radius: 15px; margin: 20px auto; max-width: 500px; display: none; }
  </style>
</head>
<body>
  <header><h1>🍳 Cookoria</h1><nav><a href="index.html">الرئيسية</a><a href="recipes.html">الوصفات</a><a href="#" id="logoutBtn">تسجيل خروج</a></nav></header>
  <div class="demo-badge">🧪 وضع التجربة (Demo Mode) - للعرض فقط</div>
  <div id="successMessage" class="success-message"></div>
  <div class="pricing-container">
    <div class="pricing-card"><div class="badge">الأكثر شيوعاً</div><h2>📱 شهري</h2><div class="price">$5.99<small>/شهر</small></div><button class="subscribe-btn" onclick="processPayment('monthly',5.99)">اشترك الآن</button></div>
    <div class="pricing-card premium"><div class="badge">🔥 أفضل قيمة</div><h2>⭐ سنوي</h2><div class="price">$49.99<small>/سنة</small></div><button class="subscribe-btn" onclick="processPayment('yearly',49.99)">وفر 21$</button></div>
    <div class="pricing-card"><div class="badge">للتجربة</div><h2>🍽️ وصفة</h2><div class="price">$2.99</div><button class="subscribe-btn" onclick="processPayment('single',2.99)">اشتري الآن</button></div>
  </div>
  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { db } from './js/firebase-config.js';
    
    onAuthStateChanged(auth, (user) => { if(!user) window.location.href='login.html'; });
    window.processPayment = async (plan, amount) => {
      const user = auth.currentUser;
      if(!user){ alert('الرجاء تسجيل الدخول'); window.location.href='login.html'; return; }
      if(confirm(`🧪 Demo Mode\nالباقة: ${plan}\nالمبلغ: $${amount}\nاضغط OK للمحاكاة`)){
        await setDoc(doc(db,'users',user.uid), { isPremium: true, plan, amount, purchasedAt: new Date().toISOString() }, { merge: true });
        document.getElementById('successMessage').innerHTML = `✅ تم الاشتراك بنجاح! الباقة: ${plan}`;
        document.getElementById('successMessage').style.display = 'block';
        setTimeout(() => window.location.href = 'recipes.html', 2000);
      }
    };
    document.getElementById('logoutBtn')?.addEventListener('click', async (e) => {
      e.preventDefault();
      const { signOut } = await import('./js/firebase-config.js');
      await signOut(auth);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
